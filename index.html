<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcium Airdrop Checker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');
  :root {
    --purple: #7B3FE4; --purple-light: #9B6FF0; --purple-dark: #5A1EC8;
    --bg: #0A0710; --surface: #120D1E; --surface2: #1C1530;
    --text: #F0EAFF; --muted: #8B7AAE; --green: #39F5A0; --red: #FF5B7A; --gold: #FFD166;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; position: relative; }
  body::before { content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(ellipse at 30% 20%, rgba(123,63,228,0.15) 0%, transparent 50%), radial-gradient(ellipse at 70% 80%, rgba(123,63,228,0.1) 0%, transparent 50%); animation: bgPulse 8s ease-in-out infinite alternate; pointer-events: none; }
  @keyframes bgPulse { 0% { transform: scale(1) rotate(0deg); } 100% { transform: scale(1.1) rotate(5deg); } }
  body::after { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(123,63,228,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(123,63,228,0.05) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }
  .container { width: 100%; max-width: 680px; padding: 40px 20px 80px; position: relative; z-index: 1; }
  header { text-align: center; margin-bottom: 48px; animation: fadeDown 0.6s ease both; }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  .logo-wrap { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 16px; }
  .logo-img { width: 52px; height: 52px; border-radius: 14px; box-shadow: 0 0 30px rgba(123,63,228,0.6); }
  .brand-name { font-size: 36px; font-weight: 800; letter-spacing: -1px; background: linear-gradient(135deg, #fff 40%, var(--purple-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .tagline { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
  .badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(57,245,160,0.1); border: 1px solid rgba(57,245,160,0.3); color: var(--green); font-family: 'Space Mono', monospace; font-size: 11px; padding: 5px 12px; border-radius: 100px; margin-top: 14px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(57,245,160,0.3); } 50% { box-shadow: 0 0 0 8px rgba(57,245,160,0); } }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
  .input-card { background: var(--surface); border: 1px solid rgba(123,63,228,0.2); border-radius: 20px; padding: 32px; margin-bottom: 20px; animation: fadeUp 0.6s 0.1s ease both; position: relative; overflow: hidden; }
  .input-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--purple), transparent); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }
  .input-row { display: flex; gap: 12px; }
  input { flex: 1; background: var(--surface2); border: 1px solid rgba(123,63,228,0.25); border-radius: 12px; padding: 14px 18px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 13px; outline: none; transition: all 0.3s; min-width: 0; }
  input::placeholder { color: var(--muted); opacity: 0.5; }
  input:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(123,63,228,0.15); }
  .check-btn { background: var(--purple); color: #fff; border: none; border-radius: 12px; padding: 14px 24px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; white-space: nowrap; position: relative; overflow: hidden; }
  .check-btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent); }
  .check-btn:hover { background: var(--purple-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(123,63,228,0.4); }
  .check-btn:active { transform: translateY(0); }
  .check-btn.loading { pointer-events: none; opacity: 0.8; }
  .network-row { display: flex; gap: 8px; margin-top: 16px; }
  .net-btn { flex: 1; background: var(--surface2); border: 1px solid rgba(123,63,228,0.2); color: var(--muted); border-radius: 10px; padding: 9px 12px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; }
  .net-btn.active { background: rgba(123,63,228,0.15); border-color: var(--purple); color: var(--purple-light); }
  .net-btn:hover { border-color: var(--purple-light); color: var(--text); }
  .loader { display: none; text-align: center; padding: 40px; animation: fadeUp 0.3s ease both; }
  .loader.show { display: block; }
  .spinner { width: 48px; height: 48px; border: 3px solid rgba(123,63,228,0.2); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); letter-spacing: 2px; }
  .loader-steps { margin-top: 16px; font-family: 'Space Mono', monospace; font-size: 11px; color: rgba(123,63,228,0.7); }
  .result-card { display: none; background: var(--surface); border: 1px solid rgba(123,63,228,0.2); border-radius: 20px; overflow: hidden; animation: fadeUp 0.5s ease both; }
  .result-card.show { display: block; }
  .result-header { padding: 24px 32px; background: rgba(123,63,228,0.08); border-bottom: 1px solid rgba(123,63,228,0.15); display: flex; align-items: center; justify-content: space-between; }
  .result-header-left { display: flex; align-items: center; gap: 12px; }
  .status-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .status-icon.eligible { background: rgba(57,245,160,0.15); }
  .status-icon.noteligible { background: rgba(255,91,122,0.15); }
  .result-title { font-size: 18px; font-weight: 700; }
  .result-title.eligible { color: var(--green); }
  .result-title.noteligible { color: var(--red); }
  .result-addr { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
  .tier-badge { font-family: 'Space Mono', monospace; font-size: 11px; padding: 4px 12px; border-radius: 100px; font-weight: 700; letter-spacing: 1px; }
  .tier-badge.diamond { background: rgba(125,211,252,0.1); color: #7dd3fc; border: 1px solid rgba(125,211,252,0.3); }
  .tier-badge.gold { background: rgba(255,209,102,0.1); color: var(--gold); border: 1px solid rgba(255,209,102,0.3); }
  .tier-badge.silver { background: rgba(200,200,220,0.1); color: #c8c8dc; border: 1px solid rgba(200,200,220,0.3); }
  .result-body { padding: 28px 32px; }
  .airdrop-amount { text-align: center; padding: 32px 0 24px; }
  .amount-label { font-size: 12px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; font-weight: 600; }
  .amount-number { font-size: 64px; font-weight: 800; line-height: 1; background: linear-gradient(135deg, var(--purple-light), #C084FC, var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: countUp 1s ease both; }
  @keyframes countUp { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
  .amount-symbol { font-size: 28px; color: var(--muted); margin-left: 8px; }
  .amount-usd { font-family: 'Space Mono', monospace; font-size: 14px; color: var(--muted); margin-top: 6px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-box { background: var(--surface2); border: 1px solid rgba(123,63,228,0.15); border-radius: 14px; padding: 16px; text-align: center; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; font-weight: 600; }
  .stat-value { font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700; color: var(--text); }
  .stat-value.green { color: var(--green); }
  .stat-value.gold { color: var(--gold); }
  .stat-value.purple { color: var(--purple-light); }
  .progress-section { margin-bottom: 24px; }
  .progress-label { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; color: var(--muted); font-weight: 600; }
  .progress-bar { height: 8px; background: var(--surface2); border-radius: 100px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--purple-light)); border-radius: 100px; transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1); width: 0; }
  .activities { margin-bottom: 24px; }
  .activities-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 600; margin-bottom: 12px; }
  .activity-item { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid rgba(123,63,228,0.08); }
  .activity-item:last-child { border-bottom: none; }
  .activity-left { display: flex; align-items: center; gap: 12px; }
  .activity-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; background: rgba(123,63,228,0.1); }
  .activity-name { font-size: 14px; font-weight: 600; }
  .activity-pts { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--green); }
  .claim-btn { width: 100%; background: linear-gradient(135deg, var(--purple-dark), var(--purple)); color: #fff; border: none; border-radius: 14px; padding: 18px; font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; cursor: pointer; transition: all 0.3s; letter-spacing: 0.5px; position: relative; overflow: hidden; }
  .claim-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent); }
  .claim-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(123,63,228,0.5); }
  .not-eligible-body { padding: 48px 32px; text-align: center; }
  .not-eligible-icon { font-size: 48px; margin-bottom: 16px; }
  .not-eligible-title { font-size: 22px; font-weight: 700; color: var(--red); margin-bottom: 8px; }
  .not-eligible-desc { color: var(--muted); font-size: 14px; line-height: 1.6; }
  .stats-footer { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: rgba(123,63,228,0.1); border: 1px solid rgba(123,63,228,0.1); border-radius: 16px; overflow: hidden; margin-top: 20px; animation: fadeUp 0.6s 0.3s ease both; }
  .footer-stat { background: var(--surface); padding: 20px; text-align: center; }
  .footer-stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
  .footer-stat-value { font-family: 'Space Mono', monospace; font-size: 17px; font-weight: 700; color: var(--purple-light); }
  .disclaimer { text-align: center; margin-top: 24px; font-family: 'Space Mono', monospace; font-size: 10px; color: rgba(139,122,174,0.4); letter-spacing: 1px; animation: fadeUp 0.6s 0.4s ease both; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-wrap">
      <img class="logo-img" src="https://pbs.twimg.com/profile_images/1898785276551884800/aYqMoBKH_400x400.jpg" alt="Arcium" onerror="this.style.display='none'">
      <span class="brand-name">Arcium</span>
    </div>
    <div class="tagline">Airdrop Eligibility Checker</div>
    <div class="badge"><div class="dot"></div>Snapshot Live</div>
  </header>

  <div class="input-card">
    <label>Wallet Address</label>
    <div class="input-row">
      <input type="text" id="walletInput" placeholder="0x... or Solana address" />
      <button class="check-btn" id="checkBtn" onclick="checkEligibility()">Check</button>
    </div>
    <div class="network-row">
      <button class="net-btn active" onclick="selectNet(this,'EVM')">EVM</button>
      <button class="net-btn" onclick="selectNet(this,'Solana')">Solana</button>
      <button class="net-btn" onclick="selectNet(this,'Cosmos')">Cosmos</button>
      <button class="net-btn" onclick="selectNet(this,'Aptos')">Aptos</button>
    </div>
  </div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div class="loader-text" id="loaderText">SCANNING SNAPSHOT DATA...</div>
    <div class="loader-steps" id="loaderSteps"></div>
  </div>

  <div class="result-card" id="resultCard"></div>

  <div class="stats-footer">
    <div class="footer-stat"><div class="footer-stat-label">Total Wallets</div><div class="footer-stat-value">43,218</div></div>
    <div class="footer-stat"><div class="footer-stat-label">Eligible</div><div class="footer-stat-value">11,047</div></div>
    <div class="footer-stat"><div class="footer-stat-label">Total Supply</div><div class="footer-stat-value">150M</div></div>
  </div>

  <div class="disclaimer">⚠ This tool is for entertainment purposes only. Results do not reflect actual airdrop eligibility.</div>
</div>

<script>
let selectedNetwork = 'EVM';
function selectNet(btn, net) {
  document.querySelectorAll('.net-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedNetwork = net;
}
const loaderMessages = [
  ['SCANNING BLOCKCHAIN...', 'Fetching transaction history...'],
  ['QUERYING SNAPSHOT DATABASE...', 'Analyzing on-chain activity...'],
  ['CALCULATING SCORE...', 'Determining tier...'],
  ['LOADING RESULTS...', 'Running final checks...'],
];
async function checkEligibility() {
  const addr = document.getElementById('walletInput').value.trim();
  if (!addr) {
    document.getElementById('walletInput').style.borderColor = 'var(--red)';
    setTimeout(() => document.getElementById('walletInput').style.borderColor = '', 1500);
    return;
  }
  document.getElementById('resultCard').classList.remove('show');
  const loader = document.getElementById('loader');
  loader.classList.add('show');
  const btn = document.getElementById('checkBtn');
  btn.classList.add('loading');
  btn.textContent = '...';
  let step = 0;
  const stepInterval = setInterval(() => {
    if (step < loaderMessages.length) {
      document.getElementById('loaderText').textContent = loaderMessages[step][0];
      document.getElementById('loaderSteps').textContent = loaderMessages[step][1];
      step++;
    }
  }, 700);
  await sleep(3200);
  clearInterval(stepInterval);
  loader.classList.remove('show');
  btn.classList.remove('loading');
  btn.textContent = 'Check';
  const hash = simpleHash(addr);
  const eligible = hash % 3 !== 0;
  showResult(addr, eligible, hash);
}
function simpleHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  return Math.abs(h);
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function showResult(addr, eligible, hash) {
  const card = document.getElementById('resultCard');
  const shortAddr = addr.length > 20 ? addr.slice(0,8) + '...' + addr.slice(-6) : addr;
  if (eligible) {
    const tiers = ['DIAMOND','GOLD','SILVER'];
    const tierIdx = hash % 3;
    const tierName = tiers[tierIdx];
    const tierClass = tierName.toLowerCase();
    const baseAmounts = [48200, 22500, 9800];
    const amount = baseAmounts[tierIdx] + (hash % 3000);
    const usd = (amount * 0.38).toFixed(0);
    const txCount = 15 + (hash % 200);
    const volume = 1200 + (hash % 50000);
    const days = 30 + (hash % 300);
    const score = 650 + (hash % 350);
    const activities = [
      { icon: '🔐', name: 'MXE Transactions', pts: '+' + (80 + hash % 150), done: true },
      { icon: '💧', name: 'Liquidity Provision', pts: '+' + (50 + hash % 100), done: true },
      { icon: '🗳️', name: 'Governance Voting', pts: '+' + (40 + hash % 60), done: tierIdx < 2 },
      { icon: '🤝', name: 'Referral Program', pts: '+' + (30 + hash % 80), done: tierIdx === 0 },
    ];
    card.innerHTML = `
      <div class="result-header">
        <div class="result-header-left">
          <div class="status-icon eligible">✅</div>
          <div>
            <div class="result-title eligible">You're Eligible!</div>
            <div class="result-addr">${shortAddr} · ${selectedNetwork}</div>
          </div>
        </div>
        <span class="tier-badge ${tierClass}">${tierName}</span>
      </div>
      <div class="result-body">
        <div class="airdrop-amount">
          <div class="amount-label">Total Airdrop Amount</div>
          <div><span class="amount-number" id="amountNum">0</span><span class="amount-symbol">$ARC</span></div>
          <div class="amount-usd">≈ $${Number(usd).toLocaleString()} USD</div>
        </div>
        <div class="stats-grid">
          <div class="stat-box"><div class="stat-label">Transactions</div><div class="stat-value green">${txCount}</div></div>
          <div class="stat-box"><div class="stat-label">Volume (USD)</div><div class="stat-value gold">$${Number(volume).toLocaleString()}</div></div>
          <div class="stat-box"><div class="stat-label">Active Days</div><div class="stat-value purple">${days}</div></div>
        </div>
        <div class="progress-section">
          <div class="progress-label"><span>Activity Score</span><span>${score} / 1000</span></div>
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>
        <div class="activities">
          <div class="activities-title">Completed Activities</div>
          ${activities.map(a => `
            <div class="activity-item">
              <div class="activity-left">
                <div class="activity-icon">${a.icon}</div>
                <span class="activity-name">${a.name}</span>
              </div>
              <div style="display:flex;align-items:center;gap:12px">
                <span class="activity-pts">${a.pts}</span>
                <span>${a.done ? '✅' : '❌'}</span>
              </div>
            </div>`).join('')}
        </div>
        <button class="claim-btn">🚀 Claim Airdrop</button>
      </div>`;
    setTimeout(() => {
      const el = document.getElementById('amountNum');
      let current = 0;
      const target = amount;
      const s = target / (1200 / 16);
      const interval = setInterval(() => {
        current = Math.min(current + s, target);
        el.textContent = Math.floor(current).toLocaleString();
        if (current >= target) clearInterval(interval);
      }, 16);
    }, 100);
    setTimeout(() => {
      const fill = document.getElementById('progressFill');
      if (fill) fill.style.width = (score / 10) + '%';
    }, 200);
  } else {
    card.innerHTML = `
      <div class="result-header">
        <div class="result-header-left">
          <div class="status-icon noteligible">❌</div>
          <div>
            <div class="result-title noteligible">Not Eligible</div>
            <div class="result-addr">${shortAddr} · ${selectedNetwork}</div>
          </div>
        </div>
      </div>
      <div class="not-eligible-body">
        <div class="not-eligible-icon">😔</div>
        <div class="not-eligible-title">Not Qualified</div>
        <div class="not-eligible-desc">
          This wallet did not meet the snapshot criteria.<br><br>
          Keep participating in the Arcium ecosystem for future airdrops.<br><br>
          <strong style="color:var(--purple-light)">Use MXE, provide liquidity, and vote in governance!</strong>
        </div>
      </div>`;
  }
  card.classList.add('show');
}
</script>
</body>
</html>
